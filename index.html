<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ülke - Başkent Oyunu</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: #0b82c9;
      overflow-x: hidden;
      color: #17324d;
    }

    .game {
      min-height: 100vh;
      position: relative;
      background-image:
        linear-gradient(to bottom, rgba(0,0,0,.04), rgba(0,0,0,.28)),
        url("avrupa-haritasi.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
      overflow: hidden;
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.25), transparent 18%),
        radial-gradient(circle at 78% 20%, rgba(255,255,255,.22), transparent 16%),
        radial-gradient(circle at 50% 88%, rgba(255,230,88,.18), transparent 24%);
      pointer-events: none;
      z-index: 0;
    }

    .topbar,
    .map-focus,
    .question-card,
    .hint {
      position: relative;
      z-index: 2;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      animation: dropIn .7s ease both;
    }

    .title {
      background: linear-gradient(#a8662d, #6f3716);
      color: white;
      padding: 10px 14px;
      border-radius: 20px;
      border: 4px solid rgba(255,255,255,.8);
      box-shadow: 0 7px 0 #4d260f, 0 10px 18px rgba(0,0,0,.25);
      font-size: clamp(20px, 6vw, 34px);
      font-weight: 900;
      letter-spacing: .5px;
      text-shadow: 2px 3px #4b260e;
      max-width: 68%;
    }

    .stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    .pill {
      background: rgba(255,246,220,.94);
      border: 3px solid #ffffff;
      border-radius: 18px;
      padding: 8px 11px;
      box-shadow: 0 5px 0 rgba(0,0,0,.22);
      font-weight: 900;
      font-size: 14px;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .map-focus {
      flex: 1;
      min-height: 300px;
    }

    .floating-country {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(255, 229, 79, .98);
      color: #17324d;
      border: 4px solid white;
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 6px 0 rgba(0,0,0,.22), 0 0 0 5px rgba(255,229,79,.3);
      display: none;
      z-index: 3;
      text-align: center;
      animation: pulseBadge 1.2s ease-in-out infinite;
    }

    .transport-icon {
      position: absolute;
      z-index: 1;
      font-size: clamp(28px, 7vw, 48px);
      filter: drop-shadow(0 7px 5px rgba(0,0,0,.28));
      pointer-events: none;
    }

    .plane-a { left: 16%; top: 22%; animation: flyOne 7s linear infinite; }
    .plane-b { right: 10%; top: 38%; animation: flyTwo 8s linear infinite; }
    .ship-a { left: 20%; bottom: 15%; animation: floatShip 3s ease-in-out infinite; }
    .truck-a { right: 16%; bottom: 22%; animation: bounceTruck 1.8s ease-in-out infinite; }

    .question-card {
      width: min(680px, 100%);
      margin: 0 auto;
      background: rgba(255, 246, 223, .96);
      border: 5px solid white;
      border-radius: 28px;
      padding: 14px;
      box-shadow: 0 9px 0 rgba(0,0,0,.22), 0 18px 35px rgba(0,0,0,.28);
      backdrop-filter: blur(5px);
      animation: riseIn .7s ease both;
    }

    .question {
      text-align: center;
      font-size: clamp(19px, 5vw, 30px);
      font-weight: 900;
      margin-bottom: 12px;
      color: #17324d;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 10px;
      font-size: 17px;
      font-weight: 900;
      background: #ffffff;
      color: #1d3b57;
      box-shadow: 0 5px 0 #c9bfa8;
      cursor: pointer;
      transition: .15s;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(3px) scale(.98);
      box-shadow: 0 2px 0 #c9bfa8;
    }

    .correct { background: #55c85f !important; color: white; animation: pop .35s ease; }
    .wrong { background: #ff6262 !important; color: white; animation: shake .35s ease; }

    .message {
      margin-top: 10px;
      text-align: center;
      min-height: 26px;
      font-size: 18px;
      font-weight: 900;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .controls button {
      flex: 1;
      background: #1f8fd5;
      color: white;
      box-shadow: 0 5px 0 #0b5e95;
    }

    .hint {
      position: absolute;
      left: 14px;
      bottom: 14px;
      background: rgba(255,255,255,.92);
      border: 3px solid white;
      border-radius: 18px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(0,0,0,.18);
      max-width: 220px;
    }

    .start-screen,
    .end-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background:
        linear-gradient(to bottom, rgba(13,126,195,.82), rgba(6,67,119,.9)),
        url("avrupa-haritasi.png");
      background-size: cover;
      background-position: center;
    }

    .start-card,
    .end-card {
      width: min(520px, 100%);
      background: rgba(255,248,225,.97);
      border: 6px solid white;
      border-radius: 34px;
      padding: 24px 18px;
      text-align: center;
      box-shadow: 0 14px 0 rgba(0,0,0,.22), 0 25px 55px rgba(0,0,0,.35);
      animation: startPop .75s ease both;
    }

    .logo-bubble {
      width: 92px;
      height: 92px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffe75e, #ff9f2f);
      border: 5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      box-shadow: 0 8px 0 rgba(0,0,0,.18);
      animation: logoFloat 2s ease-in-out infinite;
    }

    .start-card h1,
    .end-card h2 {
      font-size: clamp(28px, 8vw, 44px);
      color: #17324d;
      line-height: 1.05;
      margin-bottom: 10px;
      font-weight: 1000;
    }

    .start-card p,
    .end-card p {
      font-size: 17px;
      font-weight: 800;
      color: #35516a;
      margin-bottom: 16px;
      line-height: 1.35;
    }

    .start-tags {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tag {
      background: white;
      border: 3px solid #ffe17d;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 4px 0 rgba(0,0,0,.12);
    }

    .start-btn,
    .end-btn {
      width: 100%;
      background: linear-gradient(#2fca74, #14924c);
      color: white;
      border: 4px solid white;
      box-shadow: 0 7px 0 #0b6733;
      font-size: 22px;
      padding: 16px;
    }

    .hide {
      display: none !important;
    }

    .fade-out {
      animation: fadeOut .45s ease forwards;
    }

    @keyframes dropIn {
      from { transform: translateY(-25px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes riseIn {
      from { transform: translateY(35px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes startPop {
      from { transform: scale(.86) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(1.03); }
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-9px) rotate(2deg); }
    }

    @keyframes pulseBadge {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.08); }
    }

    @keyframes flyOne {
      0% { transform: translateX(-40px) rotate(9deg); }
      50% { transform: translateX(55px) translateY(-12px) rotate(15deg); }
      100% { transform: translateX(-40px) rotate(9deg); }
    }

    @keyframes flyTwo {
      0% { transform: translateX(35px) rotate(-15deg); }
      50% { transform: translateX(-45px) translateY(14px) rotate(-8deg); }
      100% { transform: translateX(35px) rotate(-15deg); }
    }

    @keyframes floatShip {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes bounceTruck {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @media (max-width: 600px) {
      .game {
        background-size: auto 68%;
        background-position: center 72px;
      }

      .title {
        max-width: 62%;
        font-size: 20px;
        padding: 9px 10px;
      }

      .pill {
        font-size: 12px;
        padding: 7px 9px;
      }

      .map-focus {
        min-height: 360px;
      }

      .question-card {
        padding: 12px;
        border-radius: 24px;
      }

      .answers {
        grid-template-columns: 1fr 1fr;
      }

      button {
        font-size: 15px;
        padding: 13px 8px;
      }

      .hint {
        display: none;
      }

      .floating-country {
        font-size: 12px;
        padding: 7px 10px;
      }
    }

    @media (min-width: 900px) {
      .game {
        padding: 24px;
        background-size: cover;
        background-position: center;
      }

      .question-card {
        position: absolute;
        left: 24px;
        top: 130px;
        width: 390px;
        margin: 0;
      }

      .map-focus {
        min-height: calc(100vh - 170px);
      }
    }
  </style>
</head>
<body>
  <div class="start-screen" id="startScreen">
    <div class="start-card">
      <div class="logo-bubble">🌍</div>
      <h1>Avrupa Başkent Challenge</h1>
      <p>Haritayı keşfet, ülkeyi bul, doğru başkenti seç ve puanları topla!</p>
      <div class="start-tags">
        <span class="tag">✈️ Hava</span>
        <span class="tag">🚢 Deniz</span>
        <span class="tag">🚛 Kara</span>
      </div>
      <button class="start-btn" id="startBtn">Oyuna Başla</button>
    </div>
  </div>

  <div class="end-screen hide" id="endScreen">
    <div class="end-card">
      <div class="logo-bubble">🏆</div>
      <h2>Oyun Bitti!</h2>
      <p id="endText">Toplam puanın: 0</p>
      <button class="end-btn" id="playAgainBtn">Tekrar Oyna</button>
    </div>
  </div>

  <main class="game">
    <div class="transport-icon plane-a">✈️</div>
    <div class="transport-icon plane-b">🛩️</div>
    <div class="transport-icon ship-a">🚢</div>
    <div class="transport-icon truck-a">🚛</div>

    <header class="topbar">
      <div class="title">ÜLKE - BAŞKENT OYUNU</div>
      <div class="stats">
        <div class="pill">⭐ Puan: <span id="score">0</span></div>
        <div class="pill">🎯 Soru: <span id="progress">1</span>/<span id="total">10</span></div>
      </div>
    </header>

    <section class="map-focus">
      <div class="floating-country" id="countryBadge">FRANSA</div>
    </section>

    <section class="question-card">
      <div class="question" id="question">Fransa ülkesinin başkenti neresidir?</div>
      <div class="answers" id="answers"></div>
      <div class="message" id="message"></div>
      <div class="controls">
        <button id="nextBtn">Sonraki Soru</button>
        <button id="restartBtn">Yeniden Başlat</button>
      </div>
    </section>

    <div class="hint">Harita görseli dosya adı:<br><b>avrupa-haritasi.png</b></div>
  </main>

  <script>
    const questions = [
      { country: "Fransa", capital: "Paris", options: ["Paris", "Berlin", "Roma", "Madrid"], x: 34, y: 57 },
      { country: "Almanya", capital: "Berlin", options: ["Viyana", "Berlin", "Atina", "Varşova"], x: 47, y: 45 },
      { country: "İtalya", capital: "Roma", options: ["Roma", "Paris", "Brüksel", "Lizbon"], x: 50, y: 67 },
      { country: "İspanya", capital: "Madrid", options: ["Madrid", "Oslo", "Sofya", "Prag"], x: 23, y: 75 },
      { country: "Türkiye", capital: "Ankara", options: ["İstanbul", "Ankara", "Bursa", "İzmir"], x: 78, y: 75 },
      { country: "Polonya", capital: "Varşova", options: ["Varşova", "Berlin", "Budapeşte", "Paris"], x: 58, y: 49 },
      { country: "Yunanistan", capital: "Atina", options: ["Sofya", "Atina", "Roma", "Madrid"], x: 61, y: 75 },
      { country: "Birleşik Krallık", capital: "Londra", options: ["Dublin", "Londra", "Paris", "Amsterdam"], x: 30, y: 38 },
      { country: "Hollanda", capital: "Amsterdam", options: ["Amsterdam", "Brüksel", "Berlin", "Kopenhag"], x: 39, y: 42 },
      { country: "Belçika", capital: "Brüksel", options: ["Brüksel", "Paris", "Roma", "Lizbon"], x: 37, y: 49 }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const startScreen = document.getElementById("startScreen");
    const endScreen = document.getElementById("endScreen");
    const startBtn = document.getElementById("startBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const endText = document.getElementById("endText");
    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const messageEl = document.getElementById("message");
    const scoreEl = document.getElementById("score");
    const progressEl = document.getElementById("progress");
    const totalEl = document.getElementById("total");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const countryBadge = document.getElementById("countryBadge");

    totalEl.textContent = questions.length;

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function loadQuestion() {
      answered = false;
      const q = questions[current];
      questionEl.textContent = `${q.country} ülkesinin başkenti neresidir?`;
      progressEl.textContent = current + 1;
      messageEl.textContent = "";
      answersEl.innerHTML = "";

      countryBadge.textContent = q.country.toUpperCase();
      countryBadge.style.left = q.x + "%";
      countryBadge.style.top = q.y + "%";
      countryBadge.style.display = "block";

      shuffle(q.options).forEach(option => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = () => checkAnswer(btn, option);
        answersEl.appendChild(btn);
      });
    }

    function checkAnswer(button, selected) {
      if (answered) return;
      answered = true;
      const q = questions[current];
      const buttons = answersEl.querySelectorAll("button");

      buttons.forEach(btn => {
        if (btn.textContent === q.capital) btn.classList.add("correct");
      });

      if (selected === q.capital) {
        score += 10;
        button.classList.add("correct");
        messageEl.textContent = "Harika! Doğru cevap 🎉";
      } else {
        button.classList.add("wrong");
        messageEl.textContent = `Yanlış. Doğru cevap: ${q.capital}`;
      }

      scoreEl.textContent = score;
    }

    function nextQuestion() {
      if (!answered) {
        messageEl.textContent = "Önce bir cevap seçmelisin 😊";
        return;
      }

      if (current < questions.length - 1) {
        current++;
        loadQuestion();
      } else {
        finishGame();
      }
    }

    function finishGame() {
      countryBadge.style.display = "none";
      endText.textContent = `Toplam puanın: ${score} / ${questions.length * 10}`;
      endScreen.classList.remove("hide");
    }

    function restartGame() {
      current = 0;
      score = 0;
      scoreEl.textContent = score;
      endScreen.classList.add("hide");
      loadQuestion();
    }

    startBtn.addEventListener("click", () => {
      startScreen.classList.add("fade-out");
      setTimeout(() => {
        startScreen.classList.add("hide");
      }, 450);
    });

    playAgainBtn.addEventListener("click", restartGame);
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartGame);

    loadQuestion();
  </script>
</body>
</html>
